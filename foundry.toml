[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
gas_reports = ["MockERC20", "LPToken", "AMM", "LendingPool", "MockPriceOracle"]

[fuzz]
runs = 512

[invariant]
runs = 128
depth = 32

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
